<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>

    <link rel="stylesheet" href="../../static/css/customer.css">
</head>

<body>

<div class="header">
    <div class="logo">GOLDEN <span>HARVEST</span></div>
    <div class="auth-buttons">
        <button onclick="window.location.href='../auth/login.html'">Đăng nhập</button>
        <button onclick="window.location.href='../auth/register.html'">Đăng ký</button>
    </div>
</div>

<div class="hero">
    <div class="overlay"></div>

    <!--  THÊM WRAPPER -->
    <div class="main-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2></h2>

            <a href="home.html">🏠 Trang chủ</a>
            <a href="search.html">🔍 Tìm kiếm</a>
            <a href="booking.html">📅 Đặt bàn</a>
            <a href="history.html" id="historyLink" style="display:none;">📜 Lịch sử</a>
            <button onclick="logout()" id="logoutBtn" class="btn-logout" style="display:none;">Đăng xuất</button>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <h2>Trang chủ</h2>

            <!-- CARDS -->
            <div class="dashboard">
                <div class="card">
                    <h3>🍽️ Nhà hàng</h3>
                    <p>Tìm kiếm và xem menu nhà hàng dễ dàng</p>
                    <a href="search.html" class="btn">Tìm kiếm</a>
                </div>

                <div class="card">
                    <h3>📅 Đặt bàn</h3>
                    <p>Đặt bàn nhanh chóng chỉ trong vài bước</p>
                    <a href="booking.html" class="btn">Đặt ngay</a>
                </div>

                <div class="card" id="historyCard" style="display:none;">
                    <h3>📜 Lịch sử</h3>
                    <p>Xem lại các lần đặt bàn trước đó</p>
                    <a href="history.html" class="btn">Xem lịch sử</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:5000/api"


    // LOGOUT
    function logout() {
        // Bắt buộc phải xóa token ở frontend để mất trạng thái đăng nhập
        localStorage.removeItem("token");

        fetch(`${API}/logout`, {
            credentials: "include"
        })
                .then(() => {
                    // Chuyển hướng về trang chủ hoặc reload lại trang
                    window.location.href = "home.html";
                })
                .catch(err => {
                    console.error("Lỗi đăng xuất:", err);
                    // Dù lỗi API hay không thì cứ reload lại vì token đã bị xóa
                    window.location.reload();
                });
    }

    // CHECK LOGIN
    window.onload = () => {
        const token = localStorage.getItem("token");
        console.log("TOKEN:", token);

        if (!token) return;

        fetch(`${API}/v1/customer/me`, {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        })
                .then(res => {
                    console.log("STATUS:", res.status);
                    if (!res.ok) {
                        throw new Error("Token hết hạn hoặc không hợp lệ");
                    }
                    return res.json();
                })
                .then(data => {
                    console.log("DATA:", data);

                    if (data.logged_in || data.id) {
                        // Người dùng đã đăng nhập: Ẩn auth-buttons, hiện các chức năng riêng
                        document.querySelector(".auth-buttons").style.display = "none";

                        document.getElementById("logoutBtn").style.display = "block";
                        document.getElementById("historyLink").style.display = "block";
                        document.getElementById("historyCard").style.display = "block";

                    }
                })
                .catch(error => {
                    console.error("Lỗi xác thực:", error);
                    // Nếu token sai/hết hạn, xóa đi cho sạch
                    localStorage.removeItem("token");
                });
    }

    // UI SWITCH

    function closePopup() {
        if (typeof authBox !== 'undefined') {
            authBox.style.display = "none";
        }
    }
</script>

</body>
</html>
