{% extends "base.html" %}

{% block header %}
Tìm kiếm nhà hàng
{% endblock %}

{% block content %}

<input id="address" placeholder="Tìm kiếm nhà hàng...">

<select id="cuisine">
    <option value="">Loại hình ẩm thực</option>
    <option value="1">Lẩu</option>
    <option value="2">Nướng</option>
    <option value="3">Hải sản</option>
    <option value="4">Chay</option>
    <option value="5">Hấp</option>
</select>

<button onclick="search()">Tìm kiếm</button>

<div id="result"></div>

<script>
function search() {
    const address = document.getElementById("address").value;
    const cuisine = document.getElementById("cuisine").value;

    fetch(`/api/v1/customer/search?address=${encodeURIComponent(address)}&cuisine=${cuisine}`)
        .then(res => res.json())
        .then(data => {
            let html = "";

            if (data.length === 0) {
                html = "<p>Không tìm thấy nhà hàng</p>";
            }

            data.forEach(r => {
                html += `
                    <div>
                        <h3>${r.RestaurantName}</h3>
                        <p>${r.Address}</p>
                        <p>${r.Phone}</p>
                        <p>${r.Available}</p>
                        <button onclick="goMenu(${r.RestaurantID})">
                            Xem chi tiết
                        </button>
                    </div>
                `;
            });

            document.getElementById("result").innerHTML = html;
        });
}

function goMenu(id) {
    window.location.href = `/api/v1/customer/menu-page?id=${id}`;
}
</script>
{% endblock %}
