
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đặt bàn</title>

    <link rel="stylesheet" href="../../static/css/customer.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🍽️ Restaurant</h2>

        <a href="home.html">🏠 Trang chủ</a>
        <a href="search.html">🔍 Tìm kiếm</a>
        <a href="booking.html">📅 Đặt bàn</a>
        <a href="history.html">📜 Lịch sử</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <h2 style="text-align:center;">📜 Lịch sử đặt bàn</h2>

        <div class="toolbar">
            <input id="searchInput" placeholder="🔍 Tìm theo tên hoặc mã...">

            <select id="statusFilter">
                <option value="">Tất cả</option>
                <option value="Pending">Pending</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>

        <div id="historyContainer" class="history-grid"></div>

        <button class="btn btn-closehst" onclick="goHome()">❌ Đóng</button>

        <!-- REVIEW POPUP -->
        <div id="reviewBox" style="
            display:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
            z-index:9999;
            width:300px;
        ">

            <h3>⭐ Đánh giá</h3>

            <input type="hidden" id="restaurantId">
            <input type="hidden" id="reservationId">

            <label>Rating:</label>
            <input type="number" id="rating" min="1" max="5">

            <label>Nhận xét:</label>
            <textarea id="comment"></textarea>

            <br><br>
            <button onclick="submitReview()">Gửi</button>
            <button onclick="closeReview()">Đóng</button>
        </div>

    </div>
</div>

<script>
const API = "http://localhost:5000/api"

let bookings = []

window.onload = () => {
    loadHistory()

    // SEARCH
    searchInput.addEventListener("keyup", filterData)

    // FILTER
    statusFilter.addEventListener("change", filterData)
}

function loadHistory() {
    fetch(`${API}/history`, {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {

        console.log("DATA:", data)

        if (!Array.isArray(data)) {
            data = data.data || []
        }

        bookings = data
        renderTable(data)
    })
    .catch(err => {
        console.error("Lỗi fetch history:", err)
    })
}

function filterData() {
    const key = searchInput.value.toLowerCase()
    const status = statusFilter.value

    let filtered = bookings.filter(b =>
        b.CustomerName.toLowerCase().includes(key) ||
        String(b.ReservationID).includes(key)
    )

    if (status) {
        filtered = filtered.filter(b => b.Status === status)
    }

    renderTable(filtered)
}

function renderTable(data) {
    let html = ""

    if (data.length === 0) {
        html = "<p>Không có dữ liệu</p>"
    }

    data.forEach(b => {
        html += `
            <div class="history-card ${b.Status}"
                 onclick="handleClick('${b.Status}',
                                        ${b.RestaurantID || b.restaurant_id},
                                        ${b.ReservationID})">

                <div class="card-header">
                    <h3>🍲 ${b.RestaurantName || "Nhà hàng"}</h3>
                    <span class="status ${b.Status}">
                        ${b.Status}
                    </span>
                </div>

                <div class="card-body">
                    <p>📅 ${b.BookingDate} - ${b.BookingTime}</p>
                    <p>👤 ${b.GuestCount} người</p>
                    <p>🪑 Bàn: ${b.TableNumber || "Chưa xếp"}</p>
                </div>

                <div class="card-footer">
                    ${
                        b.Status === "Confirmed"
                        ? `<button onclick="event.stopPropagation(); openReview(${b.RestaurantID || b.restaurant_id}, ${b.ReservationID})">
                                ⭐ Đánh giá
                           </button>`
                        : ""
                    }
                </div>

            </div>
        `
    })

    historyContainer.innerHTML = html
}

function handleClick(status, restaurantID, reservationID) {
    if (status === "Confirmed") {
        openReview(restaurantID, reservationID)
    } else if (status === "Cancelled") {
        alert("Đơn đã bị hủy")
    } else {
        alert("Chưa sử dụng dịch vụ")
    }
}

function goHome() {
    window.location.href = "home.html"
}

function openReview(restaurantID, reservationID) {
    reviewBox.style.display = "block"
    restaurantId.value = restaurantID
    reservationId.value = reservationID
}

function closeReview() {
    reviewBox.style.display = "none"
}

function submitReview() {
    const rID = restaurantId.value

    if (!rID) {
        alert("Thiếu RestaurantID")
        return
    }

    fetch(`${API}/review`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        credentials: "include",
        body: JSON.stringify({
            RestaurantID: parseInt(rID),
            ReservationID: parseInt(reservationId.value),
            Rating: parseInt(rating.value),
            Comment: comment.value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error)
        if (data.message) closeReview()
    })
}
</script>

</body>
</html>
