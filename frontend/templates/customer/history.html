<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đặt bàn</title>

    <link rel="stylesheet" href="../../static/css/customer.css">
</head>

<body>

<div class="header">
    <div class="logo">GOLDEN <span>HARVEST</span></div>
</div>

<div class="hero">
    <div class="overlay"></div>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <a href="home.html">🏠 Trang chủ</a>
            <a href="search.html">🔍 Tìm kiếm</a>
            <a href="booking.html">📅 Đặt bàn</a>
            <a href="history.html" id="historyLink" style="display:none;">📜 Lịch sử</a>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <h2> Lịch sử đặt bàn</h2>

            <div class="toolbar">
                <input id="searchInput" placeholder="🔍 Tìm theo tên hoặc mã...">

                <select id="statusFilter">
                    <option value="">Tất cả</option>
                    <option value="Pending">Pending</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>

            <div id="historyContainer" class="history-grid"></div>

            <button class="btn btn-closehst" onclick="goHome()"> Đóng</button>

            <!-- REVIEW POPUP -->
            <div id="reviewBox" class="popup" style="display:none;">
                <div class="popup-content">
                    <h3>⭐ Đánh giá</h3>
                    <h3>⭐ Đánh giá <span id="displayRestaurantName" style="color: #ff9800;"></span></h3>

                    <input type="hidden" id="restaurantId">
                    <input type="hidden" id="reservationId">

                    <label>Rating:</label>
                    <input type="number" id="rating" min="1" max="5">

                    <label>Nhận xét:</label>
                    <textarea id="comment"></textarea>

                    <br><br>
                    <button onclick="submitReview()">Gửi</button>
                    <button onclick="closeReview()">Đóng</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Đổi lại 127.0.0.1 để chống lỗi CORS
    const API = "http://127.0.0.1:5000";

    let bookings = [];

    window.onload = () => {
        const token = localStorage.getItem("token");

        // 1. Kiểm tra nhanh: Không có token trong máy thì khỏi load gì hết
        if (!token) {
            alert("Bạn chưa đăng nhập!");
            window.location.href = "../auth/login.html";
            return;
        }
        fetch(`${API}/api/v1/customer/me`, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token, // <--- TRÌNH THẺ TẠI ĐÂY
                "Content-Type": "application/json"
            }
        })
                .then(res => {
                    if (!res.ok) {
                        // Vé giả hoặc hết hạn -> Đuổi ra ngoài, tịch thu vé cũ
                        alert("Phiên đăng nhập hết hạn hoặc Token sai. Vui lòng đăng nhập lại!");
                        localStorage.removeItem("token");
                        window.location.href = "../auth/login.html";
                        throw new Error("Token invalid");
                    }
                    return res.json();
                })
                .then(data => {
                    // Check thành công, cho phép hiện Lịch sử
                    const historyLink = document.getElementById("historyLink");
                    if (historyLink) historyLink.style.display = "block";

                    // Gọi hàm tải dữ liệu, truyền cái token xuống luôn cho tiện
                    loadHistory(token);

                    const searchInput = document.getElementById("searchInput");
                    const statusFilter = document.getElementById("statusFilter");
                    if (searchInput) searchInput.addEventListener("keyup", filterData);
                    if (statusFilter) statusFilter.addEventListener("change", filterData);
                })
                .catch(err => console.log("Lỗi check token:", err));
    }

    function loadHistory() {
        const token = localStorage.getItem("token");
        fetch(`${API}/api/v1/customer/history`, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            }
        })
                .then(res => res.json())
                .then(data => {
                    console.log("DATA:", data);
                    if (!Array.isArray(data)) {
                        data = data.data || [];
                    }
                    bookings = data;
                    renderTable(data);
                })
                .catch(err => {
                    console.error("Lỗi fetch history:", err);
                });
    }

    function filterData() {
        const searchInput = document.getElementById("searchInput");
        const statusFilter = document.getElementById("statusFilter");
        const key = searchInput ? searchInput.value.toLowerCase() : "";
        const status = statusFilter ? statusFilter.value : "";

        let filtered = bookings.filter(b =>
                (b.CustomerName && b.CustomerName.toLowerCase().includes(key)) ||
                String(b.ReservationID).includes(key)
        );

        if (status) {
            filtered = filtered.filter(b => b.Status === status);
        }
        renderTable(filtered);
    }

    async function renderTable(data) {
        const historyContainer = document.getElementById("historyContainer");
        let html = "";

        if (!data || data.length === 0) {
            if (historyContainer) historyContainer.innerHTML = "<p>Không có dữ liệu</p>";
            return;
        }

        for (const b of data) {
            let reviewHtml = "";

            // CHỈ CHECK KHI ĐÃ CONFIRMED
            if (b.Status === "Confirmed") {
                const reviewData = await checkReview(b.ReservationID);
                if (reviewData.reviewed) {
                    reviewHtml = `
                    <div class="review-box">
                        <div class="stars">
                            ${"⭐".repeat(Math.round(reviewData.rating || 0))}
                            <span class="rating-number">(${reviewData.rating}/5)</span>
                        </div>
                        <div class="review-text">
                            ${reviewData.comment || "Không có nhận xét"}
                        </div>
                    </div>`;
                } else {
                    reviewHtml = `<button onclick="event.stopPropagation(); openReview(${b.RestaurantID || b.restaurant_id}, ${b.ReservationID},'${b.RestaurantName}')">⭐ Đánh giá</button>`;
                }
            }

            html += `
            <div class="history-card ${b.Status}" onclick="handleClick('${b.Status}', ${b.RestaurantID || b.restaurant_id}, ${b.ReservationID})">
                <div class="card-header">
                    <h3>🍲 ${b.RestaurantName || "Nhà hàng"}</h3>
                    <span class="status ${b.Status}">${b.Status}</span>
                </div>
                <div class="card-body">
                    <p>📅 ${b.BookingDate} - ${b.BookingTime}</p>
                    <p>👤 ${b.GuestCount} người</p>
                    <p>🪑 Bàn: ${b.TableNumber || "Chưa xếp"}</p>
                </div>
                <div class="card-footer">
                    ${reviewHtml}
                </div>
            </div>`;
        }

        if (historyContainer) historyContainer.innerHTML = html;
    }

    // --- CÁC HÀM NÀY PHẢI NẰM ĐỘC LẬP BÊN NGOÀI, KHÔNG ĐƯỢC NHÉT VÀO TRONG RENDERTABLE ---

    async function handleClick(status, restaurantID, reservationID) {
        if (status === "Confirmed") {
            const reviewData = await checkReview(reservationID);
            if (reviewData.reviewed) {
                return; // KHÔNG MỞ LẠI
            }
            openReview(restaurantID, reservationID);
        } else if (status === "Cancelled") {
            alert("Đơn đã bị hủy");
        } else {
            alert("Chưa sử dụng dịch vụ");
        }
    }

    async function checkReview(reservationId) {
        const token = localStorage.getItem("token");
        // Lưu ý check lại đường dẫn API này trong Flask xem có đúng không nha
        const res = await fetch(`${API}/api/v1/customer/review/check?reservation_id=${reservationId}`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });
        return await res.json();
    }

    function goHome() {
        window.location.href = "home.html";
    }

    let currentReviewReservationID = null;
    let currentReviewRestaurantID = null;

    function openReview(restaurantID, reservationID) {
        const reviewBox = document.getElementById("reviewBox");
        const rIdInput = document.getElementById("restaurantId");
        const resIdInput = document.getElementById("reservationId");

        if (reviewBox) reviewBox.style.display = "flex";
        if (nameDisplay) nameDisplay.innerText = restaurantName; // Hiển thị tên lên popup
        currentReviewRestaurantID = restaurantID;
        currentReviewReservationID = reservationID;
    }

    function closeReview() {
        const reviewBox = document.getElementById("reviewBox");
        if (reviewBox) reviewBox.style.display = "none";
    }

    function submitReview() {
        const token = localStorage.getItem("token");

        if (!token) {
            alert("Vui lòng đăng nhập lại!");
            return;
        }

        if (!currentReviewRestaurantID || !currentReviewReservationID) {
            alert("Thiếu mã nhà hàng hoặc mã đơn đặt bàn! Hãy load lại trang.");
            return;
        }

        const ratingInput = document.getElementById("rating");
        const commentInput = document.getElementById("comment");

        fetch(`${API}/api/v1/customer/review`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                RestaurantID: parseInt(currentReviewRestaurantID),
                ReservationID: parseInt(currentReviewReservationID), // <--- CHẮC CHẮN 100% CÓ SỐ
                Rating: parseInt(ratingInput ? ratingInput.value : 5),
                Comment: commentInput ? commentInput.value : ""
            })
        })
                .then(res => res.json())
                .then(data => {
                    alert(data.message || data.error);
                    if (data.message) {
                        closeReview();
                        loadHistory(); // Load lại bảng để check xem nó hiện sao chưa
                    }
                })
                .catch(err => {
                    console.error("Lỗi gửi review:", err);
                });
    }
</script>

</body>
</html>
