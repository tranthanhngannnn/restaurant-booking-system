
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đặt bàn</title>

    <link rel="stylesheet" href="../../static/css/customer.css">
</head>

<body>

<div class="header">
    <div class="logo">GOLDEN <span>HARVEST</span></div>
</div>

<div class="hero">
    <div class="overlay"></div>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <a href="home.html">🏠 Trang chủ</a>
            <a href="search.html">🔍 Tìm kiếm</a>
            <a href="booking.html">📅 Đặt bàn</a>
            <a href="history.html" id="historyLink" style="display:none;">📜 Lịch sử</a>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <h2> Lịch sử đặt bàn</h2>

            <div class="toolbar">
                <input id="searchInput" placeholder="🔍 Tìm theo tên hoặc mã...">

                <select id="statusFilter">
                    <option value="">Tất cả</option>
                    <option value="Pending">Pending</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>

            <div id="historyContainer" class="history-grid"></div>

            <button class="btn btn-closehst" onclick="goHome()"> Đóng</button>

            <!-- REVIEW POPUP -->
            <div id="reviewBox" class="popup" style="display:none;">
                <div class="popup-content">
                    <h3>⭐ Đánh giá</h3>

                    <input type="hidden" id="restaurantId">
                    <input type="hidden" id="reservationId">

                    <label>Rating:</label>
                    <input type="number" id="rating" min="1" max="5">

                    <label>Nhận xét:</label>
                    <textarea id="comment"></textarea>

                    <br><br>
                    <button onclick="submitReview()">Gửi</button>
                    <button onclick="closeReview()">Đóng</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const API = "http://127.0.0.1:5000/api/v1/customer"

let bookings = []

window.onload = () => {
    const historyLink = document.getElementById("historyLink")


    // 🔥 CHECK LOGIN
    fetch(`${API}/me`, {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {
        if (data.logged_in) {
            historyLink.style.display = "block"
        } else {
            alert("Bạn chưa đăng nhập")
            window.location.href = "home.html"
        }
    })

    // LOAD DATA
    loadHistory()

    searchInput.addEventListener("keyup", filterData)
    statusFilter.addEventListener("change", filterData)
}

function loadHistory() {
    fetch(`${API}/history`, {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {

        console.log("DATA:", data)

        if (!Array.isArray(data)) {
            data = data.data || []
        }

        bookings = data
        renderTable(data)
    })
    .catch(err => {
        console.error("Lỗi fetch history:", err)
    })
}

function filterData() {
    const key = searchInput.value.toLowerCase()
    const status = statusFilter.value

    let filtered = bookings.filter(b =>
        b.CustomerName.toLowerCase().includes(key) ||
        String(b.ReservationID).includes(key)
    )

    if (status) {
        filtered = filtered.filter(b => b.Status === status)
    }

    renderTable(filtered)
}

async function renderTable(data) {
    let html = ""

    if (data.length === 0) {
        html = "<p>Không có dữ liệu</p>"
        historyContainer.innerHTML = html
        return
    }
    for (const b of data) {

        let reviewHtml = ""
        // CHỈ CHECK KHI ĐÃ CONFIRMED
        if (b.Status === "Confirmed") {
            const reviewData = await checkReview(b.RestaurantID || b.restaurant_id)
            if (reviewData.reviewed) {
                reviewHtml = `
                    <div class="review-box">
                        <div class="stars">
                            ${"\u2B50".repeat(Math.round(reviewData.rating || 0))}
                            <span class="rating-number">(${reviewData.rating}/5)</span>
                        </div>
                        <div class="review-text">
                            ${reviewData.comment || "Không có nhận xét"}
                        </div>
                    </div>
                `
            } else {
                reviewHtml = `
                    <button onclick="event.stopPropagation(); openReview(${b.RestaurantID || b.restaurant_id}, ${b.ReservationID})">
                        ⭐ Đánh giá
                    </button>
                `
            }
        }
        html += `
            <div class="history-card ${b.Status}"
                 onclick="handleClick('${b.Status}',
                  ${b.RestaurantID || b.restaurant_id},${b.ReservationID})">
                <div class="card-header">
                    <h3>🍲 ${b.RestaurantName || "Nhà hàng"}</h3>
                    <span class="status ${b.Status}">
                        ${b.Status}
                    </span>
                </div>

                <div class="card-body">
                    <p>📅 ${b.BookingDate} - ${b.BookingTime}</p>
                    <p>👤 ${b.GuestCount} người</p>
                    <p>🪑 Bàn: ${b.TableNumber || "Chưa xếp"}</p>
                </div>

                <div class="card-footer">
                    ${reviewHtml}
                </div>

            </div>
        `
    }

    historyContainer.innerHTML = html
}

async function handleClick(status, restaurantID, reservationID) {
    if (status === "Confirmed") {
        const reviewData = await checkReview(restaurantID)
        if (reviewData.reviewed) {
            return //  KHÔNG MỞ LẠI
        }
        openReview(restaurantID, reservationID)
    } else if (status === "Cancelled") {
        alert("Đơn đã bị hủy")
    } else {
        alert("Chưa sử dụng dịch vụ")
    }
}
async function checkReview(restaurantId) {
    const res = await fetch(`${API}/review/check?restaurant_id=${restaurantId}`, {
        credentials: "include"
    });
    return await res.json();
}
function goHome() {
    window.location.href = "home.html"
}

function openReview(restaurantID, reservationID) {
    reviewBox.style.display = "flex"
    restaurantId.value = restaurantID
    reservationId.value = reservationID
}

function closeReview() {
    reviewBox.style.display = "none"
}

function validateReview(ratingValue, commentValue) {
    if (
        ratingValue === "" ||
        isNaN(ratingValue) ||
        !Number.isInteger(Number(ratingValue)) ||
        ratingValue < 1 ||
        ratingValue > 5
    ) {
        return "Vui lòng nhập đánh giá từ 1-5 sao";
    }
    // Comment optional
    if (commentValue) {
        if (commentValue.length < 5 || commentValue.length > 500) {
            return "Bình luận chỉ được từ 5 đến 500 ký tự";
        }
    }
    return null;
}

function submitReview() {
    const rID = restaurantId.value
    const ratingValue = rating.value
    const commentValue = comment.value.trim()

    if (!rID) {
        alert("Thiếu RestaurantID")
        return
    }
    // VALIDATE TRƯỚC KHI GỌI API
    const error = validateReview(ratingValue, commentValue)
    if (error) {
        alert(error)
        return
    }
    fetch(`${API}/review`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        credentials: "include",
        body: JSON.stringify({
            RestaurantID: parseInt(rID),
            ReservationID: parseInt(reservationId.value),
            Rating: parseInt(ratingValue),
            Comment: commentValue
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error)

        if (data.message) {
            closeReview()
            loadHistory()
        }
    })
}



</script>

</body>
</html>
