
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt bàn</title>

    <link rel="stylesheet" href="../../static/css/customer.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🍽️ Restaurant</h2>

        <a href="home.html">🏠 Trang chủ</a>
        <a href="search.html">🔍 Tìm kiếm</a>
        <a href="booking.html">📅 Đặt bàn</a>
        <a href="history.html" id="historyMenu" style="display:none;">📜 Lịch sử</a>
    </div>

    <div class="content">

        <h2>Đặt bàn</h2>

        <select id="restaurantSelect" onchange="changeRestaurant(this.value)">
            <option value="">-- Chọn nhà hàng --</option>
        </select>

        <p>Giờ hoạt động:
            <span id="openTime"></span> -
            <span id="closeTime"></span>
        </p>

        <input id="nameInput" placeholder="Họ tên"><br>
        <input id="phoneInput" placeholder="SĐT"><br>

        <input id="dateInput" type="date">
        <input id="timeInput" type="time"><br>

        <input id="peopleInput" type="number" placeholder="Số người"><br>

        <textarea id="noteInput" placeholder="Ghi chú"></textarea><br>

        <button onclick="check()">Kiểm tra bàn</button>

        <h3>Bàn trống</h3>
        <div id="tables"></div>

        <!-- PAYMENT -->
        <div id="paymentBox" style="display:none; border:1px solid black; padding:20px;">
            <h3>Thanh toán</h3>
            <p>Mã đơn: <span id="resId"></span></p>
            <p>Tên: <span id="cusName"></span></p>
            <p>SĐT: <span id="cusPhone"></span></p>
            <p>Ngày: <span id="cusDate"></span></p>
            <p>Giờ: <span id="cusTime"></span></p>
            <p>Số người: <span id="cusPeople"></span></p>
            <p>Tiền cọc: <b id="depositText"></b></p>
            <img id="qrImg" width="200">
            <br><br>
            <button onclick="confirmPayment()">Đã chuyển khoản</button>
            <button onclick="closePayment()">Đóng</button>
        </div>

        <!-- SUCCESS -->
        <div id="successBox" style="
            display:none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            text-align: center;
        ">
            <h3 style="color: green;">Đặt bàn thành công!</h3>
            <button onclick="goHome()">Quay về trang chủ</button>
        </div>

    </div>
</div>

<script>
const API = "http://localhost:5000/api"

let params = new URLSearchParams(window.location.search)
let restaurant_id = params.get("restaurant_id") || params.get("id")

let selectedTable = null
let reservationId = null
let bookingData = {}

// LOAD
window.onload = function() {

    fetch(`${API}/restaurants`)
    .then(res => res.json())
    .then(data => {
        restaurantSelect.innerHTML = `<option value="">-- Chọn nhà hàng --</option>`

        data.forEach(r => {
            const option = document.createElement("option")
            option.value = r.RestaurantID
            option.textContent = r.RestaurantName

            if (restaurant_id && r.RestaurantID == restaurant_id) {
                option.selected = true
            }

            restaurantSelect.appendChild(option)
        })

        if (restaurant_id) {
            loadRestaurantInfo(restaurant_id)
        }
    })
}

// CHANGE RESTAURANT
function changeRestaurant(id) {
    restaurant_id = id
    loadRestaurantInfo(id)
}

// LOAD INFO
function loadRestaurantInfo(id) {
    fetch(`${API}/restaurant/${id}`)
    .then(res => res.json())
    .then(data => {
        const open = data.Opentime.substring(0,5)
        const close = data.Closetime.substring(0,5)

        timeInput.min = open
        timeInput.max = close

        openTime.innerText = open
        closeTime.innerText = close
    })
}

// TIME HELPER
function toMinutes(t) {
    const [h, m] = t.split(":").map(Number)
    return h * 60 + m
}

// CHECK TABLE
function check() {
    const name = nameInput.value.trim()
    const phone = phoneInput.value.trim()
    const date = dateInput.value
    const time = timeInput.value
    const people = peopleInput.value

    const open = timeInput.min
    const close = timeInput.max

    // VALIDATION
    if (!name || !phone || !date || !time || !people) {
        alert("Vui lòng nhập đầy đủ thông tin!")
        return
    }

    if (!restaurant_id) {
        alert("Vui lòng chọn nhà hàng!")
        return
    }

    if (!open || !close) {
        alert("Chưa load giờ nhà hàng!")
        return
    }

    const timeVal = toMinutes(time)
    const openVal = toMinutes(open)
    const closeVal = toMinutes(close)

    if (timeVal < openVal || timeVal > closeVal) {
        alert(`Chỉ được đặt từ ${open} đến ${close}`)
        return
    }

    // CALL API
    fetch(`${API}/check?restaurant_id=${restaurant_id}&date=${date}&time=${time}&people=${people}`)
    .then(async res => {
        const data = await res.json()

        if (!res.ok) {
            alert(data.error || "Có lỗi xảy ra!")
            return
        }

        let html = ""
        data.forEach(t => {
            html += `<button onclick="selectTable(${t.TableID})">
                        Bàn ${t.TableID} (${t.Capacity})
                     </button>`
        })

        tables.innerHTML = html
    })
}

// SELECT TABLE
function selectTable(id) {
    selectedTable = id
    createBooking()
}

// CREATE BOOKING
function createBooking() {

    fetch(`${API}/book`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: "include",
            body: JSON.stringify({
            name: nameInput.value,
            phone: phoneInput.value,
            restaurant_id,
            table_id: selectedTable,
            date: dateInput.value,
            time: timeInput.value,
            people: peopleInput.value,
            note: noteInput.value
        })
    })
    .then(res => res.json())
    .then(data => {
        reservationId = data.reservation_id
        bookingData = data
        openPayment()
    })
}

// PAYMENT
function openPayment() {
    paymentBox.style.display = "block"

    resId.innerText = reservationId
    cusName.innerText = nameInput.value
    cusPhone.innerText = phoneInput.value
    cusDate.innerText = dateInput.value
    cusTime.innerText = timeInput.value
    cusPeople.innerText = peopleInput.value

    depositText.innerText = bookingData.deposit + " VND"
    qrImg.src = bookingData.qr
}

function closePayment() {
    paymentBox.style.display = "none"
}

// CONFIRM
function confirmPayment() {
    fetch(`${API}/payment`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        credentials: "include",
        body: JSON.stringify({
            reservation_id: reservationId,
            amount: bookingData.deposit
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error)
            return
        }
        closePayment()
        showSuccess()
    })
}

// SUCCESS
function showSuccess() {
    successBox.style.display = "block"
}

function goHome() {
    window.location.href = "home.html"
}
</script>

</body>
</html>
