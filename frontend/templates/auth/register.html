<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../static/css/auth.css">
    <title>GOLDEN HARVEST | Đăng ký</title>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo">
            <p>GOLDEN <span>HARVEST</span></p>
        </div>
        <div class="nav-button">
            <a class="btn" id="loginBtn" onclick="window.location.href='login.html'">Đăng nhập</a>
            <a class="btn white-btn" id="registerBtn" onclick="window.location.href='register.html'">Đăng ký</a>
        </div>
    </nav>

    <div class="form-box">
        <div class="register-container" id="register">
            <div class="top">
                <span>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></span>
                <header>Đăng ký tài khoản</header>
            </div>

            <form id="registerForm">
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Tên đăng nhập" name="username" id="user" required>
                    <i class="bx bx-user"></i>
                </div>

                <div class="input-box">
                    <input type="email" class="input-field" placeholder="Email" name="email" required>
                    <i class="bx bx-envelope"></i>
                </div>

                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Số điện thoại" name="phone">
                    <i class="bx bx-phone"></i>
                </div>

                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Mật khẩu" name="password" id="pass" required>
                    <i class="bx bx-lock-alt"></i>
                </div>

                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Xác nhận mật khẩu" id="confirm_pass" required>
                    <i class="bx bx-check-shield"></i>
                </div>

                <div class="input-box">
                    <select name="role" id="roleSelect" class="input-field" onchange="toggleRestaurantDropdown()" 
                            style="background: rgba(255, 255, 255, 0.2); border: none; padding-left: 50px;">
                        <option value="CUSTOMER" style="color: black;">Khách hàng</option>
                        <option value="STAFF" style="color: black;">Nhân viên</option>
                    </select>
                    <i class="bx bx-briefcase-alt-2"></i>
                </div>

                <div class="input-box" id="restaurantDiv" style="display: none; margin-top: 25px;">
                    <select id="restaurantSelect" name="restaurant_id" class="input-field">
                        <option value="">-- Chọn Nhà Hàng --</option>
                    </select>
                    <i class="bx bx-store-alt"></i>
                </div>

                <div class="input-box">
                    <input type="submit" class="submit" value="Đăng ký ngay">
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/auth_register.js"></script>
</body>
</html>
