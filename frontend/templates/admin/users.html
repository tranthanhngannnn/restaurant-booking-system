<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Golden Harvest | User Management</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body>

<header class="admin-header">
    <div class="header-left">
        <a href="homepage.html" style="text-decoration: none;">
            <h1 class="logo">GOLDEN <span>HARVEST</span></h1>
        </a>
    </div>

    <div class="header-right">
        <nav class="admin-nav">
            <a href="restaurants.html" class="nav-item">Restaurants</a>
            <a href="cuisine.html" class="nav-item">Cuisine</a>
            <a href="users.html" class="nav-item active">Users</a>
        </nav>

        <button onclick="handleLogout()" class="btn-logout">Đăng xuất</button>
    </div>
</header>

<div class="User-list-container">
    <div class="header">
        <h2>User Management</h2>
        <button class="btn-add" onclick="openAddModal()">+ Thêm User</button>
    </div>

    <table class="user-table">
        <thead>
            <tr>
                <th class="cell-id">ID</th>
                <th class="cell-info">Username</th>
                <th class="cell-email">Email</th>
                <th class="cell-phone">Phone</th>
                <th class="cell-role">Role</th>
                <th class="cell-action">Thao tác</th>
            </tr>
        </thead>
        <tbody id="user-list-body"></tbody>
    </table>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <h3 id="user-title">Người Dùng</h3>
        <input type="hidden" id="form-id">

        <div class="form-group">
            <label>Họ tên:</label>
            <input type="text" id="user-field-name" placeholder="Nhập họ tên...">
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="user-field-email" placeholder="Nhập email...">
        </div>

        <div class="form-group">
            <label>Phone:</label>
            <input type="text" id="user-field-phone" placeholder="Nhập Số Điện Thoại...">
        </div>

        <div class="form-group">
            <label>Role:</label>
            <select id="user-field-role">
                <option value="STAFF">STAFF</option>
                <option value="ADMIN">ADMIN</option>
                <option value="CUSTOMER">CUSTOMER</option>
            </select>
        </div>

        <div class="modal-actions">
            <button id="button-submit" class="btn-add">Lưu</button>
            <button onclick="closeUserEntry()" class="btn-logout" style="background: #95a5a6;">Hủy</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5000/api/v1/admin/users';

    async function fetchUsers() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch(API_URL, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const users = await res.json();
            const tbody = document.getElementById('user-list-body');

            tbody.innerHTML = users.map(u => `
                <tr>
                    <td class="cell-id">${u.id}</td>
                    <td class="cell-info"><strong>${u.username}</strong></td>
                    <td class="cell-email">${u.email}</td>
                    <td class="cell-phone">${u.phone || 'Chưa có số'}</td>
                    <td class="cell-role"><strong>${u.role}</strong></td>
                    <td class="cell-action">
                        <button class="btn-edit" onclick="openEditModal(${u.id}, '${u.username}', '${u.email}', '${u.phone}', '${u.role}')">Sửa</button>
                        <button class="btn-delete" onclick="handleDelete(${u.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            console.error("Lỗi:", err);
        }
    }

    async function handleAdd() {
        const token = localStorage.getItem('token');
        const formData = new FormData();
        formData.append('Username', document.getElementById('user-field-name').value);
        formData.append('Email', document.getElementById('user-field-email').value);
        formData.append('Phone', document.getElementById('user-field-phone').value);
        formData.append('Role', document.getElementById('user-field-role').value);
        formData.append('Password', '123456'); 

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${token}`},
                body: formData
            });

            if (response.ok) {
                alert("Thêm user thành công!");
                closeUserEntry();
                fetchUsers();
            } else {
                const error = await response.json();
                alert("Lỗi: " + (error.message || "Thất bại"));
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function updateUser(id) {
        const token = localStorage.getItem('token');
        const formData = new FormData();
        formData.append('Username', document.getElementById('user-field-name').value);
        formData.append('Email', document.getElementById('user-field-email').value);
        formData.append('Phone', document.getElementById('user-field-phone').value);
        formData.append('Role', document.getElementById('user-field-role').value);

        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: {'Authorization': `Bearer ${token}`},
                body: formData
            });

            if (response.ok) {
                alert("Cập nhật thành công!");
                closeUserEntry();
                fetchUsers();
            } else {
                const error = await response.json();
                alert("Lỗi: " + (error.message || "Thất bại"));
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function handleDelete(id) {
        if (confirm("Xóa user này?")) {
            const token = localStorage.getItem('token');
            await fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            fetchUsers();
        }
    }

    function openAddModal() {
        document.getElementById('form-id').value = '';
        document.getElementById('user-field-name').value = '';
        document.getElementById('user-field-email').value = '';
        document.getElementById('user-field-phone').value = '';
        document.getElementById('user-field-role').value = 'CUSTOMER';
        document.getElementById('user-title').innerText = "Thêm User";
        document.getElementById('button-submit').onclick = handleAdd;
        document.getElementById('userModal').style.display = 'flex';
    }

    function openEditModal(id, name, email, phone, role) {
        document.getElementById('form-id').value = id;
        document.getElementById('user-field-name').value = name;
        document.getElementById('user-field-email').value = email;
        document.getElementById('user-field-phone').value = phone;
        document.getElementById('user-field-role').value = role;
        document.getElementById('user-title').innerText = "Sửa User";
        document.getElementById('button-submit').onclick = () => updateUser(id);
        document.getElementById('userModal').style.display = 'flex';
    }

    function closeUserEntry() {
        document.getElementById('userModal').style.display = 'none';
    }

    function handleLogout() {
        if (confirm("Bạn có chắc muốn đăng xuất không?")) {
            localStorage.removeItem('token');
            window.location.href = "../auth/login.html";
        }
    }

    window.onload = fetchUsers;
</script>
</body>
</html>
