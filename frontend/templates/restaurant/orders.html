<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Order</title>
    <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body>

<div class="container">
    <h2 class="title">🍽️ Bàn <span id="table-id"></span></h2>

    <div class="layout">

        <div class="menu">
            <h3>Menu</h3>
            <div id="menu-list" class="menu-container"></div>
        </div>

        <div class="order-box">
            <h3>Danh sách món</h3>
            <ul id="order-list"></ul>

            <div class="total">
                Tổng: <span id="total">0</span> đ
            </div>

            <div class="actions">
                <button class="create-btn" onclick="createOrder()">Gửi order</button>
                <button class="pay-btn" onclick="payOrder()">Thanh toán</button>
            </div>
        </div>

    </div>
</div>

<script src="../../static/js/menu_data.js"></script>
<script>
    // 1. Lấy Table ID
    const tableId = new URLSearchParams(window.location.search).get("table_id");
    const tableDisplay = document.getElementById("table-id");
    if(tableDisplay) tableDisplay.innerText = tableId;


    let order = [];

    // 2. Hàm Load Menu
    async function loadMenu() {
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const resId = urlParams.get('restaurant_id');

    try {

        const response = await fetch(`http://127.0.0.1:5000/api/v1/restaurant/menu`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });

        const data = await response.json();

        if (response.ok && data.length > 0) {
            renderMenu(data);
        } else {
            console.log("Không có món hoặc lỗi!");
        }
    } catch (error) {
        console.error("Lỗi fetch:", error);
    }
}

    // 3. Hàm Vẽ Menu
    function renderMenu(dataToRender, CuisineID) {
    const menuContainer = document.getElementById('menu-list');
    if (!menuContainer) return;

    const html = dataToRender.map(item => {
    console.log("Số lượng món nhận được:", dataToRender.length);
    console.log("Dữ liệu chi tiết:", dataToRender);
       let subFolder = "Lau";
    if (item.CuisineID === 2 || (typeof CuisineID !== 'undefined' && CuisineID === 2)) {
        subFolder = "Nuong";
    }

        // 2. Ép đường dẫn về static local
        // Tên file ảnh lấy từ item.image
        const finalImage = item.image;

        return `
            <div class="menu-item">
                <div class="item-image">
                    <img src="${finalImage}" onerror="this.onerror=null;this.src='https://via.placeholder.com/150?text=No+Image';">
                </div>
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p class="price">${item.price.toLocaleString()}đ</p>
                    <button class="btn-add" onclick="addItem('${item.id}', '${item.name}', ${item.price}, '${finalImage}')">Thêm</button>
                </div>
            </div>`;
    }).join('');
    menuContainer.innerHTML = html;
}

    // 4. Hàm Thêm Món
    function addItem(food_id, name, price, image) {
        const item = order.find(i => i.food_id === food_id);
        if (item) {
            item.qty++;
        } else {
            order.push({ food_id, name, price: parseFloat(price), qty: 1, image });
        }
        renderOrder();
    }

    // 5. Hàm Vẽ Giỏ Hàng
    function renderOrder() {
        const list = document.getElementById("order-list");
        if (!list) return;
        list.innerHTML = "";
        let total = 0;

        order.forEach(i => {
            total += i.price * i.qty;
            const li = document.createElement("li");
            li.innerHTML = `${i.name} x${i.qty} - ${(i.price * i.qty).toLocaleString()}đ`;
            list.appendChild(li);
        });
        const totalDisp = document.getElementById("total");
        if(totalDisp) totalDisp.innerText = total.toLocaleString();
    }

    // 6. Gửi Order & Thanh Toán
    async function createOrder() {
        if (order.length === 0) return alert("Chưa có món");
        const res = await fetch("http://127.0.0.1:5000/api/v1/restaurant/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ table_id: parseInt(tableId), items: order.map(i => ({ food_id: i.food_id, qty: i.qty })) })
        });
        if (res.ok) {
        alert("Đã gửi order");
        order = [];
        renderOrder();
        }
    }

    async function payOrder() {
        await fetch(`http://127.0.0.1:5000/api/v1/restaurant/orders/pay/${tableId}`, { method: "PUT" });
        alert("Thanh toán xong");
        window.location.href = "table.html";
    }

    window.onload = loadMenu;

    // ===== INIT =====
    window.onload = loadMenu;

</script>

</body>
</html>
