<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Order</title>
    <link rel="stylesheet" href="../../static/css/restaurant.css">
    <link rel="stylesheet" href="../../static/css/admin.css">
    <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body>

<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🍽️ Restaurant</h2>
        <a href="table.html" class="active">Quản lý bàn</a>
        <a href="comfirmbooking.html">Đơn đặt bàn</a>
        <a href="menu_mgmt.html">Menu</a>
        <a href="register_restaurant.html">Đăng ký nhà hàng</a>
        <div class="sidebar-bottom">
            <button onclick="handleLogout()" class="logout-btn">
                Đăng xuất
            </button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <h2 class="title">🍽️ Bàn <span id="table-id"></span></h2>

        <div class="layout">
            <!-- MENU -->
            <div class="menu">
                <h3>Menu</h3>
                <div id="menu-list" class="menu-container"></div>
            </div>

            <!-- ORDER -->
            <div class="order-box">
                <h3>Danh sách món</h3>
                <ul id="order-list"></ul>

                <div class="total">
                    Tổng: <span id="total">0</span> đ
                </div>

                <div class="actions">
                    <button class="create-btn" onclick="createOrder()">Gửi order</button>
                    <button class="pay-btn" onclick="payOrder()">Thanh toán</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../../static/js/menu_data.js"></script>
<script src="../../static/js/res_orders.js"></script>
</body>
</html>
