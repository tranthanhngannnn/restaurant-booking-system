<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bàn</title>
    <link rel="stylesheet" href="../../static/css/restaurant.css">
    <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body>
<div class="container">
    <div class="sidebar staff-restaurant-sidebar">
        <div class="staff-restaurant-sidebar-top">
            <h2>Restaurant</h2>
            <ul>
                <li>
                    <button type="button" class="staff-restaurant-nav-button" data-panel-target="tables">
                        Quản lý bàn
                    </button>
                </li>
                <li>
                    <a href="comfirmbooking.html" class="staff-restaurant-nav-link">Xác nhận đặt bàn</a>
                </li>
                <li>
                    <button type="button" class="staff-restaurant-nav-button" data-panel-target="register">
                        Đăng ký nhà hàng
                    </button>
                </li>
            </ul>
        </div>

        <div class="staff-restaurant-sidebar-bottom">
            <button type="button" id="logoutButton" class="staff-restaurant-logout" onclick="handleLogout()">
                Đăng xuất
            </button>
        </div>
    </div>

    <div class="main">
        <div id="restaurant-page-message" class="staff-restaurant-message" hidden></div>

        <section id="table-management-panel" class="staff-restaurant-panel">
            <div class="topbar">
                <h2>Quản lý bàn</h2>
                <button type="button" onclick="addTable()">+ Thêm bàn</button>
            </div>

            <div class="tables-container">
                <div class="side" id="left-side"></div>
                <div class="side" id="right-side"></div>
            </div>
        </section>


    </div>
</div>


<script src="../../static/js/restaurant_table.js"></script>
</body>
</html>
