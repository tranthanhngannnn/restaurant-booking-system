<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký nhà hàng</title>
    <link rel="stylesheet" href="../../static/css/restaurant.css">
    <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>🍽️ Restaurant</h2>

            <a href="table.html">Quản lý bàn</a>
            <a href="comfirmbooking.html">Đơn đặt bàn</a>
            <a href="menu_mgmt.html">Menu</a>
            <a class="active">Đăng ký nhà hàng</a>


        <div class="sidebar-bottom">
            <button onclick="handleLogout()" class="logout-btn">
                Đăng xuất
            </button>
        </div>
    </div>

    <div class="main">
        <div id="restaurant-page-message" class="staff-restaurant-message" hidden></div>

        <!-- SectionTable Management removed here -->

        <section id="restaurant-registration-panel" class="staff-restaurant-panel">
            <div class="staff-restaurant-form-shell">
                <div class="staff-restaurant-form-header">
                    <div>
                        <p class="staff-restaurant-eyebrow">Restaurant onboarding</p>
                        <h2>Đăng ký nhà hàng mới</h2>
                        <p>Điền đầy đủ thông tin để gửi yêu cầu cho admin duyệt nhà hàng.</p>
                    </div>
                </div>

                <form id="restaurant-register-form" class="staff-restaurant-form-grid">
                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-name">Tên nhà hàng</label>
                        <input id="register-restaurant-name" name="RestaurantName" type="text" required>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-address">Địa chỉ</label>
                        <input id="register-restaurant-address" name="Address" type="text" required>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-phone">SĐT</label>
                        <input id="register-restaurant-phone" name="Phone" type="text" required>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-email">Email</label>
                        <input id="register-restaurant-email" name="Email" type="email" required>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-cuisine">Loại ẩm thực</label>
                        <select id="register-restaurant-cuisine" name="CuisineID" required>
                            <option value="">Đang tải loại ẩm thực...</option>
                        </select>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-open">Giờ mở cửa</label>
                        <input id="register-restaurant-open" name="Opentime" type="time" required>
                    </div>

                    <div class="staff-restaurant-field">
                        <label for="register-restaurant-close">Giờ đóng cửa</label>
                        <input id="register-restaurant-close" name="Closetime" type="time" required>
                    </div>

                    <div class="staff-restaurant-field staff-restaurant-field-full">
                        <label for="register-restaurant-description">Mô tả nhà hàng</label>
                        <textarea id="register-restaurant-description" name="description" rows="5" required></textarea>
                    </div>

                    <div class="staff-restaurant-actions staff-restaurant-field-full">
                        <button type="button" id="register-cancel-button" class="staff-restaurant-secondary">
                            Hủy
                        </button>
                        <button type="submit" id="register-submit-button" class="staff-restaurant-primary">
                            Đăng ký
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </div>
</div>

<script src="../../static/js/register_restaurant.js"></script>
</body>
</html>
